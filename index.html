<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bike atual do Rafael</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Bike atual do Rafael</h1>

      <section class="card" aria-live="polite">
        <img
          id="bike-image"
          class="bike-image"
          src=""
          alt="Foto da bike atual do Rafael"
        />

        <p class="label">Modelo atual</p>
        <p id="bike-model" class="bike-model">Carregando...</p>

        <div class="counter-row">
          <p id="days-without-change" class="counter">Carregando...</p>
          <span
            id="current-record-badge"
            class="record-badge"
            hidden
            aria-label="Recorde de dias com a mesma bike"
            >Recorde</span>
        </div>
      </section>

      <section
        id="historico-section"
        class="historico-section card"
        aria-labelledby="historico-heading"
        hidden
      >
        <h2 id="historico-heading" class="historico-title">Histórico de bikes</h2>
        <p class="historico-intro">
          Compra, venda e tempo com cada modelo (mais recente primeiro).
        </p>
        <div id="historico-root" class="historico-root"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
